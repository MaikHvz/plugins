# --- effects/default.yml — unconditional fallback group ---
#
# One file per effect group. Filename (minus .yml) is the group name.
#
# Schema (fixed inner keys):
#   when:        pipeline stage that fires this group (REQUIRED)
#                vocabulary: firstjoin | join | presetup | postsetup
#                          | preload | postload | preteleport | postteleport
#                          | cancel | queuepush | queuepop
#   permission:  permission node that gates membership (optional; Bukkit-style)
#   players:     explicit UUID/name allowlist (optional; permission-less
#                escape hatch — primary path on Fabric servers without
#                fabric-permissions-api)
#   inherit:     other group names whose effects are prepended (optional;
#                defaults to the stage's `default` group when omitted; pass
#                `inherit: []` to opt out)
#   effects:     ordered list of <effect-name>.<arg1>.<arg2>... tokens
#                (REQUIRED; same grammar as the suffix of an
#                rtp.effect.<stage>.* permission node)
#
# The `default` group is HARDCODED — even if this file is deleted, the
# loader synthesises an empty `default` (when: postteleport, no effects)
# so resolution never fails. Edit this file to customise the fallback.
#
# ---------------------------------------------------------------------
# COPYABLE EFFECT CATALOG (commented out by default)
#
# Uncomment any line under `effects:` below to exercise that effect at
# runtime. The catalog covers every bundled effect type and the full
# positional argument list documented in
# `effects-api/src/main/java/io/github/dailystruggle/effectsapi/bukkit/LocalEffects/Readme.md`.
#
# Token grammar (dot-separated, consumed left-to-right by
# `EffectFactory.buildEffects` / `Effect.setData(String...)`):
#
#   SOUND   .TYPE.VOLUME.PITCH.DX.DY.DZ
#   PARTICLE.TYPE.NUMBER                       (server >= 1.9)
#   POTION  .TYPE.DURATION.AMPLIFIER.AMBIENT.PARTICLES.ICON
#   NOTE    .TYPE.TONE                         (>=1.17 uses Instrument enum)
#   FIREWORK.TYPE.NUMBER.POWER.COLOR.FADE.FLICKER.TRAIL.SAFE.DX.DY.DZ
#   GLIDE   .TYPE                              (rtp-Glide addon)
#
# POTION grammar is unified across Bukkit and Fabric (min MC 1.20.1).
# DURATION is in TICKS (20 = 1 s); AMPLIFIER is 0-based.
# AMBIENT / PARTICLES / ICON take true|false and are optional trailing
# fields — omit them to use effect defaults.
#
# IMPORTANT: `.` is BOTH the field separator AND would-be decimal point.
# Numeric arguments are therefore INTEGERS only. SOUND VOLUME and PITCH
# are integer PERCENT (0..100, where 100 == 1.0 / full). Writing `1.0`
# tokenizes to two tokens (`1` then `0`), giving volume=1% (silent) and
# pitch=0%. Use whole numbers — e.g. `SOUND.X.100.100.0.0.0`.
#
# Trailing args are optional — omitted positions fall back to the
# effect's seeded defaults. Type tokens are matched case-insensitively
# against the platform registry (Bukkit `Sound`/`Particle`/...; Fabric
# `ResourceLocation` namespaced as `minecraft:<lower>` when un-prefixed).
# ---------------------------------------------------------------------

when: postteleport
effects:
  # --- Active fallback set (kept minimal so unmodified servers stay quiet) ---
  # NOTE on grammar: tokens are dot-separated, so VOLUME and PITCH are
  # INTEGER PERCENT (0..100), NOT decimals. `1.0` would tokenize to two
  # tokens (`1`, `0`) yielding volume=1% (effectively silent) and
  # pitch=0% — see effects-api/.../SoundEffect#numAsFloat which divides
  # by 100. Use whole numbers; full volume is `100`, normal pitch `100`.
  - SOUND.ENTITY_ENDERMAN_TELEPORT.100.100.0.0.0
  - PARTICLE.PORTAL.32
  - POTION.SLOW_FALLING.60.1.false.false.false
  - POTION.BLINDNESS.40.1.false.false.false

  # --- SOUND catalog (TYPE.VOLUME.PITCH.DX.DY.DZ) ---
  # VOLUME / PITCH are integer percent (0..100). `100` == 1.0 (full).
  #- SOUND.ENTITY_PLAYER_LEVELUP.100.100.0.0.0
  #- SOUND.ENTITY_EXPERIENCE_ORB_PICKUP.60.120.0.0.0
  #- SOUND.BLOCK_PORTAL_TRAVEL.40.80.0.0.0
  #- SOUND.BLOCK_NOTE_BLOCK_PLING.100.200.0.0.0
  #- SOUND.UI_TOAST_CHALLENGE_COMPLETE.100.100.0.0.0
  #- SOUND.ENTITY_FIREWORK_ROCKET_BLAST.100.100.0.0.0
  #- SOUND.ENTITY_LIGHTNING_BOLT_THUNDER.50.100.0.0.0
  #- SOUND.AMBIENT_CAVE.100.100.0.0.0
  # Offset variants (DX/DY/DZ) — emit relative to player by 5 blocks east:
  #- SOUND.ENTITY_ENDERMAN_TELEPORT.100.100.5.0.0

  # --- PARTICLE catalog (TYPE.NUMBER) — server >= 1.9 only ---
  #- PARTICLE.FLAME.40
  #- PARTICLE.HEART.8
  #- PARTICLE.CLOUD.32
  #- PARTICLE.END_ROD.24
  #- PARTICLE.DRAGON_BREATH.24
  #- PARTICLE.SOUL_FIRE_FLAME.32
  #- PARTICLE.TOTEM_OF_UNDYING.40
  #- PARTICLE.ENCHANTED_HIT.16
  #- PARTICLE.HAPPY_VILLAGER.16
  #- PARTICLE.WAX_ON.12
  #- PARTICLE.SCULK_SOUL.16

  # --- POTION catalog (TYPE.DURATION.AMPLIFIER.AMBIENT.PARTICLES.ICON) ---
  # DURATION in ticks (20 = 1 s); AMPLIFIER is 0-based.
  # AMBIENT / PARTICLES / ICON are optional trailing booleans.
  #- POTION.SPEED.200.1
  #- POTION.JUMP_BOOST.200.2
  #- POTION.REGENERATION.200.0
  #- POTION.RESISTANCE.200.2
  #- POTION.FIRE_RESISTANCE.200.0
  #- POTION.NIGHT_VISION.400.0
  #- POTION.INVISIBILITY.200.0.true.false.true
  #- POTION.SLOW_FALLING.120.0
  #- POTION.LEVITATION.40.0
  #- POTION.GLOWING.200.0.false.false.true
  #- POTION.ABSORPTION.200.1

  # --- NOTE catalog (TYPE.TONE) ---
  # TYPE: PIANO, BASS_DRUM, SNARE_DRUM, STICKS, BASS_GUITAR, FLUTE, BELL,
  #       GUITAR, CHIME, XYLOPHONE, IRON_XYLOPHONE, COW_BELL, DIDGERIDOO,
  #       BIT, BANJO, PLING (1.17+ Instrument enum)
  # TONE: 0..24 (chromatic, 2 octaves)
  #- NOTE.PIANO.12
  #- NOTE.BELL.18
  #- NOTE.CHIME.20
  #- NOTE.XYLOPHONE.16
  #- NOTE.PLING.10
  #- NOTE.HARP.7

  # --- FIREWORK catalog
  #     (TYPE.NUMBER.POWER.COLOR.FADE.FLICKER.TRAIL.SAFE.DX.DY.DZ) ---
  # TYPE:    BALL, BALL_LARGE, STAR, BURST, CREEPER
  # NUMBER:  detonation count (>1 spawns extra explosions from the meta)
  # POWER:   flight power (rough seconds in air)
  # COLOR:   primary color name (Bukkit Color enum: RED, AQUA, ...)
  # FADE:    fade color (same vocabulary as COLOR)
  # FLICKER: true|false  TRAIL: true|false
  # SAFE:    true => FireworkSafetyListener absorbs damage to nearby entities
  #          (requires EffectsAPI.init(plugin))
  # DX/DY/DZ:spawn velocity offset (trailing; optional)
  #- FIREWORK.BALL.1.1.RED.YELLOW.true.true.true.0.0.0
  #- FIREWORK.BALL_LARGE.1.2.AQUA.WHITE.false.true.true.0.1.0
  #- FIREWORK.STAR.1.1.LIME.PURPLE.true.false.true.0.0.0
  #- FIREWORK.BURST.2.1.ORANGE.YELLOW.true.true.true.0.0.0
  #- FIREWORK.CREEPER.1.1.GREEN.BLACK.false.false.true.0.0.0

  # --- GLIDE (built-in via effects-api; registered on Bukkit servers >= 1.9) ---
  # Folded from the legacy `addons/RTP_Glide` plugin into `effects-api`;
  # the standalone addon is deprecated and scheduled for removal.
  # No addon install is required to use GLIDE.
  # TYPE: ELYTRA  (single-arg toggle that gives the player a one-shot
  #                temporary elytra glide on teleport arrival)
  #- GLIDE.ELYTRA

# DO NOT TOUCH VERSION NUMBER
version: "1.0"
