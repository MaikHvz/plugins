# --- Plugin Logging Toggles (lite) ---
# Trimmed for RTP-lite per ADR-024. Lite drops the SQL/database subsystem and
# the verbose reload/region-init diagnostics that ship with Pro, but it still
# needs an explicit min_level so FINE/FINER/FINEST logs do not flood the
# console. Without this file, no logging filter is loaded and every fine log
# call prints. Documentation:
# https://github.com/DailyStruggle/RTP/blob/master/docs/admin/CONFIGURATION.md#loggingyml--console-logging-verbosity
command: false              # Log player-executed RTP commands
teleport: true              # Log successful teleport events
event_changeworld: true     # Log RTP triggered by world changes
event_join: true            # Log RTP triggered on join
event_respawn: true         # Log RTP triggered on respawn
event_move: true            # Log move event processing
event_teleport: true        # Log teleport event processing
selection_failure: true     # Log info when location selection fails
system_memory_tracker: false # Debug logs for memory activity
# Plugin-scoped minimum log level. Effective filter is the finer of this and
# the Bukkit logger's own level. Accepts: SEVERE, WARNING, INFO, CONFIG, FINE,
# FINER, FINEST, ALL, OFF. INFO keeps fine-grained internal logs off by default.
min_level: INFO
# DO NOT TOUCH VERSION NUMBER
version: "1.0"
