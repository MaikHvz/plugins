# Sent when MapDispatch receives a ChartSpec whose Kind has no registered
# ChartSpecResolver (e.g. Stage 1 viewer clicks a Stage 3 sparkline before
# the resolver lands).
mapResolverMissing: "&c[P0] no chart resolver registered for this request."
# Sent when a resolver runs but the underlying data source is unavailable
# for the requested target (unknown region, no data yet, world unloaded).
# Placeholder: [region] - the requested region name (may be empty).
mapUnavailable: "&e[P1] chart data is not available right now."
# Sent when the active MapBinding cannot allocate a map handle right now
# (binding-defined back-pressure, e.g. per-viewer cap reached).
mapBusy: "&e[P1] the map service is busy; please try again shortly."
# Label for the clickable "/rtp info" menu row that, on click, mints a
# ChartSpec(BAD_POINTS_HEATMAP, ...) token and asks the active MapBinding
# to render a 128x128 heatmap of the current region's known bad-point
# spiral indices. The row is omitted at render time when NoopMapBinding
# is the installed binding (REQ-RTP-MAP-006 / ADR-047).
menuInfoBadPointsLabel: "#9D7CD8&l# bad-points map"

# --- Cross-server network mode messages ---
# Sent only when `network.enabled: true` and the player's `/rtp` is routed
# across the cross-server wait queue (see network.yml `routing.mode`).
# All keys are optional from the player's perspective - the L2 baseline
# `delayMessage` / `teleportMessage` cycle still drives the visible flow.
# Sent when the request has been accepted into the cross-server wait queue
# and is awaiting a backend claim. Placeholder: [position] - 0-indexed
# position from `pollStatus`; may be empty if the transport returns no
# position.
networkQueued: "&7[P0] queued for a cross-server destination (position [position])..."
# Sent when a player runs /rtp* while they already hold a non-terminal
# cross-server enrolment (ADR-015 / REQ-RTP-NET-015 command-lock). Placeholder:
# [position] - FIFO position when known; empty when the proxy has not yet
# assigned one.
alreadyQueued: "&cYou are already waiting in the cross-server queue (position [position]). Please wait."
# Sent when a cross-server waitlist entry is reaped after exceeding its
# configured TTL (ADR-015). No placeholders.
networkTimedOut: "&c[P0] cross-server teleport timed out while waiting for a backend."
# Sent when a cross-server waitlist enrolment is rejected because the shared
# waitlist has reached its configured maximum size (ADR-015 REJECTED_FULL).
# No placeholders.
waitlistFull: "&c[P0] cross-server queue is full; please try again shortly."
# Sent when the queue has handed the request off to the proxy router and
# a backend selection is in progress.
networkRouting: "&7[P0] routing to a backend..."
# Sent when a backend has reserved a coordinate for this player and the
# proxy is about to initiate the cross-server hop. Placeholder: [server]
# - the destination backend's serverId.
networkReserved: "&a[P0] coordinate reserved on [server]. Transferring..."
# Sent when the proxy is mid-hop. Placeholder: [server] - destination.
networkTransferring: "&a[P0] transferring to [server]..."
# Sent when the cross-server path gave up and the request fell back to
# the local backend. Placeholder: [reason] - one of the
# `RoutingDecision.FallbackReason` values (e.g. NO_LIVE_PEER, QUEUE_FULL).
networkFallback: "&e[P0] cross-server unavailable ([reason]); falling back to local."
# Sent when the cross-server request failed terminally (no fallback was
# possible). Placeholder: [reason] - the `DispatchOutcome.Failed.Reason`.
networkFailed: "&c[P0] cross-server teleport failed: [reason]."
# Sent when the player asked for a specific region (`/rtp <region>`) but
# no backend in the network is currently serving it. Placeholder:
# [region] - the requested region name.
networkRegionUnavailable: "&c[P0] no backend is currently serving region '[region]'."
# Sent when the requested region name resolves to two or more backends and
# the operator-configured policy cannot pick one (only fires
# under stronger policies than the default `warn`). Placeholder: [region].
networkRegionAmbiguous: "&c[P0] region '[region]' is ambiguous across backends; please pin a server."

# --- MultiConfig submenu ---
# Header row fallback used when no per-kind header key is registered.
# Placeholder: [parserKind] - the raw multi-config kind name.
multiconfigHeaderDefault: "#5FB3B3&l[parserKind]"
# Header row label for the regions multi-config selector page. No placeholders.
multiconfigHeaderRegions: "#5FB3B3&l regions"
# Header row label for the worlds multi-config selector page. No placeholders.
multiconfigHeaderWorlds: "#5FB3B3&l worlds"
# Toggle-row label when remove-mode is OFF. No placeholders.
multiconfigToggleRemoveModeOff: "&8[ ] remove mode"
# Toggle-row label when remove-mode is ON. Clicks on entry rows delete.
multiconfigToggleRemoveModeOn: "&c[x] remove mode (click an entry to delete)"
# Selector row label for the "+ Add new..." entry. No placeholders.
multiconfigRowAdd: "&a+ add new..."
# Hover text for the Add row. Placeholder: [name] - prefilled default name.
multiconfigRowAddHover: "&7type a name in the anvil prompt; prefilled: &f[name]"
# Hover text for an entry row in normal mode. Placeholder: [name].
multiconfigRowEditHover: "&7edit &f[name]"
# Hover text for an entry row in remove-mode. Placeholder: [name].
multiconfigRowRemoveHover: "&cdelete &f[name]"
# Confirm-delete page title row. Placeholder: [name].
multiconfigConfirmTitle: "&c&ldelete [name]?"
# Confirm-delete page Yes-row label. No placeholders.
multiconfigConfirmYes: "&c&l[confirm delete]"
# Confirm-delete page Cancel-row label. No placeholders.
multiconfigConfirmNo: "&a&l[cancel]"
# Hover text on a locked (grayed) default-region row. No placeholders.
multiconfigLockRegionDefault: "&7the default region cannot be removed"
# Hover text on a locked (grayed) world row. Placeholder: [name].
multiconfigLockWorldLoaded: "&7world '[name]' is loaded on the server; unload it before removing its config"
# Result message after a successful ADD. Placeholder: [name].
multiconfigResultAdded: "&aadded '[name]'."
# Result message after a successful REMOVE. Placeholder: [name].
multiconfigResultRemoved: "&aremoved '[name]'."
# Result message when ADD failed. Placeholders: [name], [reason].
multiconfigResultAddFailed: "&ccould not add '[name]': [reason]"
# Result message when REMOVE failed. Placeholders: [name], [reason].
multiconfigResultRemoveFailed: "&ccould not remove '[name]': [reason]"
# Result message when the proposed entry name is rejected by the sanitiser.
# Placeholder: [name].
multiconfigResultNameInvalid: "&cname '[name]' is not allowed; use letters, digits, '_', '-', '.'"
# Result message when an ADD collides with an existing entry name.
# Placeholder: [name].
multiconfigResultNameTaken: "&can entry named '[name]' already exists."

