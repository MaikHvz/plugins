# --- RTP User-Facing Messages ---
# All player- and console-visible strings.
#
# Formatting:
#   - Bukkit legacy color codes (e.g. &a, &e, &c)
#   - Hex color codes (e.g. #2636ef)
#   - PlaceholderAPI placeholders (when PAPI is installed)
#
# Placeholders:
#   - Shared "[Pn]" placeholders are defined in the `placeholders` list below.
#     [P0] is the RTP prefix by default.
#   - Per-message placeholders (e.g. [attempts], [world]) are documented inline
#     above each message that uses them.
#
# ###############################################################################
# Section 1: General Configuration
# ###############################################################################
# list of additional placeholders
# format: Pn - where n is the index in this list
placeholders:
  # P0
  - "[RTP]"

# ###############################################################################
# Section 2: Teleportation
# ###############################################################################
# when teleporting, say this
alreadyTeleporting: "&7[P0] you're already teleporting!"

# if the plugin is currently reloading
teleportDeniedReloading: "&7[P0] teleports are temporarily disabled while the plugin reloads. Please try again shortly."
delayMessage: "#9D7CD8[P0] Teleporting in [delay]. Don't move"
chunkLoading: "&7[P0] Loading chunks! please wait..."
teleportMessage: "#5FB3B3[P0] Teleported in [attempts] attempts, in [processingTime]"

# if teleport is cancelled
teleportCancel: "&7[P0] Teleport cancelled!"

# if no safe places after reaching max attempts
# placeholder: [attempts] - the maximum number of attempts
unsafe: "&7[P0] could not find a safe location within [attempts] attempts"

# when the player is on cooldown
# placeholder: [remainingCooldown] - the remaining time
cooldownMessage: "&7[P0] You can't teleport again for [remainingCooldown]"

# if the region doesn't have any locations queued and the player doesn't have rtp.unqueued permission
noLocationsQueued: "#f5eb73[P0] no locations ready at this time"

# when the queue line shifts
# placeholder: [spot] - the current position in line
queueUpdate: "#2636ef[P0] your spot in line: [spot]"

# if the player doesn't have enough money to teleport in the region
# placeholder: [money] - how much money is required for the command
notEnoughMoney: "&7[P0] you need at least $[money] for that."

# ###############################################################################
# Section 3: Time Formatting
# ###############################################################################
# for time placeholders, what to call days, hours, minutes, seconds, and milliseconds
days: "d"
hours: "h"
minutes: "m"
seconds: "s"
millis: "ms"

# ###############################################################################
# Section 4: System & Management
# ###############################################################################
# a configuration file 'version' is lower than the latest
# placeholder: [filename] - name of file, including file extension
oldFile: "&b[P0] old [filename] detected. Updating"

# detected a bukkit world that isn't in the config file
# placeholder: [world] - the world detected
newWorld: "&b[P0] detected a new world '[world]'"

# world doesn't exist in bukkit
# placeholder: [world] - the world name
invalidWorld: "&7[P0] could not find world '[world]'"

# plugin reload/update text
# placeholder: [filename] - name of file
reloading: "&b[P0] loading [filename]..."
reloaded: "&b[P0] successfully loaded [filename]."
updating: "&a[P0] updating [filename]..."
updated: "&a[P0] successfully updated [filename]."

# plugin doesn't have the command the user requested
# placeholder: [arg] - the argument attempted
badArg: "&c[P0] invalid command argument [arg]"

# when the console tries to run a command meant only for players
consoleCmdNotAllowed: "&c[P0] You must be an in-game player to execute this command."

# plugin is busy reloading
busy: "&c[P0] busy"

# Sent when the optional PvP combat check refuses /rtp because the player is in combat
pvpInCombat: "&c[P0] You cannot random-teleport while in combat."

# plugin doesn't have the subcommand or parameter the user requested
# placeholder: [arg] - the argument attempted
invalidCommand: "&c[P0] invalid command - [arg]"

# user doesn't have permission for the command requested
noPerms: "&7I'm sorry, but you do not have permission to perform this command. Please contact the server administrators if you believe that this is in error."

# ###############################################################################
# Section 5: Administrative Logs
# ###############################################################################
# logged when locations are saved/loaded from database
# placeholder: [amount] - number of locations
# placeholder: [region] - name of region
locationSaved: "&7[P0] Successfully saved [amount] locations for [region]"
locationLoaded: "&7[P0] Successfully loaded [amount] locations for [region]"

# ###############################################################################
# Section 6: Scan Command
# ###############################################################################
# messages related to the scan command
# placeholder: [scan_regions] - list of regions
scanStart: "&a[P0] scan task started for regions: [scan_regions]"
scanReset: "&7[P0] scan queue reset for regions: [scan_regions]"
scanCancel: "&7[P0] scan task cancelled for regions: [scan_regions]"
scanPause: "#A020F0[P0] scan task paused for regions: [scan_regions]"
scanResume: "#10A5F5[P0] scan task resumed for regions: [scan_regions]"
scanRunning: "&c[P0] scan task already running for regions: [scan_regions]"
scanNotRunning: "&c[P0] scan task not running for regions: [scan_regions]"
# placeholder: [scan_chunks], [scan_totalChunks], [scan_cps], [scan_landPercentage], [scan_eta]
scanStatus: "&a[P0] completed [scan_chunks] / [scan_totalChunks] chunks for regions: [scan_regions]. [scan_cps] cps. Land Percentage: [scan_landPercentage]%. ETA: [scan_eta]"

# ###############################################################################
# Section 7: Info Command
# ###############################################################################
# messages related to the info command
infoTitle: "&a&l/rtp info"
infoTickets: "&7Global Active Chunk Tickets: #7E9CC8[tickets]"
infoTeleports: "&7Active Teleport State Machines: #7E9CC8[teleports]"
infoMSPT: "&7Current Plugin MSPT: #7E9CC8[mspt]"
infoTotalLoads: "&7Lifetime Chunks Loaded: #7E9CC8[loads]"
infoLoadsByOrigin: "&7Loads by Origin: #7E9CC8[loadsByOrigin]"
infoLeakRate: "&7Current Chunk Leak Rate: #7E9CC8[leakRate]"
# --- Metrics SPI health block ---
infoQueueDepth: "&7Players Waiting In Region Queues: #7E9CC8[queueDepth]"
infoPendingTeleports: "&7Pending Teleport Pipelines: #7E9CC8[pendingTeleports]"
infoAvgPipelineMs: "&7Avg Pipeline Latency: #7E9CC8[avgPipelineMs] ms"
# Pipeline-latency percentiles (ADR-053). Placeholders: [pipelineMsP50] [pipelineMsP75]
# [pipelineMsP90] [pipelineMsP95] [pipelineMsP99] [pipelineSampleCount].
infoPipelinePercentiles: "&7Pipeline Latency (ms) P50/P75/P90/P95/P99: #7E9CC8[pipelineMsP50] / [pipelineMsP75] / [pipelineMsP90] / [pipelineMsP95] / [pipelineMsP99]&7 (n=[pipelineSampleCount])"
# Slow-teleport audit (ADR-053, immediate/unqueued teleports only). Placeholders:
# [slowPipelineCount] [slowPipelineThresholdMs].
infoSlowPipeline: "&7Slow Teleports (> #7E9CC8[slowPipelineThresholdMs]&7 ms): #7E9CC8[slowPipelineCount]"
# Queue-growth audit (ADR-053). Placeholders: [queueGrowthWarnCount] [queueGrowthWarnThreshold].
infoQueueGrowth: "&7Queue-Growth Warnings (>= #7E9CC8[queueGrowthWarnThreshold]&7): #7E9CC8[queueGrowthWarnCount]"
infoHeap: "&7JVM Heap: #7E9CC8[heapUsedMb] / [heapMaxMb] MiB"
# Header line for the Health pipeline labelled block in /rtp info.
infoHealthPipelineHeader: "&7--- Health: pipeline ---"
# TPS readout for the 1m / 5m / 15m windows. Placeholders: [tps1m] [tps5m] [tps15m].
infoTps: "&7TPS (1m/5m/15m): #7E9CC8[tps1m] / [tps5m] / [tps15m]"
# Live server MSPT and tick-budget utilisation. Placeholders: [mspt] [tickBudgetUtilisation].
infoMSPTLive: "&7Server MSPT: #7E9CC8[mspt] ms (&7tick budget: #7E9CC8[tickBudgetUtilisation]&7)"
# Configured player soft-cap vs current online count. Placeholders: [softCap] [playerCount].
infoSoftCap: "&7Players: #7E9CC8[playerCount] / [softCap]"
# Most recent database round-trip latency in ms. Placeholder: [databaseLatencyMs].
infoDatabaseLatencyMs: "&7Database Latency: #7E9CC8[databaseLatencyMs] ms"
# Generation outcome metrics (ADR-052), sourced from the process-global RtpOutcomeStats.
# Success/failure rate over all recorded generation attempts. Placeholders:
# [genSuccessRate] [genFailureRate] [genOutcomeTotal].
infoFailureRate: "&7Generation Success: #7E9CC8[genSuccessRate]&7 (fail #7E9CC8[genFailureRate]&7, n=#7E9CC8[genOutcomeTotal]&7)"
# Single most common rejection cause and its share of all failures. Placeholders:
# [genTopRejectionCause] [genTopRejectionShare].
infoTopRejectionCause: "&7Top Rejection Cause: #7E9CC8[genTopRejectionCause]&7 (#7E9CC8[genTopRejectionShare]&7)"
# Per-cause rejection breakdown (the analogue of a competitor's /rtp unsafe-stats).
# Placeholder: [genFailureBreakdown] - comma-separated cause=N list, busiest first.
infoFailureBreakdown: "&7Rejections by Cause: #7E9CC8[genFailureBreakdown]"
# Health colour-band thresholds. Doubles consumed by ColourBands in rtp-core
# to wrap coloured-variant placeholders (e.g. [tps1mColoured]) with &a/&e/&c.
infoThresholdTpsGreen: 19.5
infoThresholdTpsYellow: 18.0
infoThresholdMsptGreen: 30.0
infoThresholdMsptYellow: 45.0
infoThresholdCacheFillGreen: 0.5
infoThresholdCacheFillYellow: 0.25
infoThresholdNetworkAgeYellow: 5.0
# Header line introducing the per-Folia-region table (Folia runtime only).
infoFoliaRegionsHeader: "&7--- Folia regions ---"
# Per-row template for a single Folia region. Placeholders: [regionId] [tps1m]
# [mspt] [playerCount] [queueDepth] [tickBudgetUtilisation].
infoFoliaRegion: "  #7E9CC8[regionId]&7: tps=#7E9CC8[tps1m]&7 mspt=#7E9CC8[mspt]&7 players=#7E9CC8[playerCount]&7 queue=#7E9CC8[queueDepth]&7 budget=#7E9CC8[tickBudgetUtilisation]"
infoDisclaimerHeader: "&7--- Diagnostic Disclaimer ---"
infoDisclaimer: "&7Diagnostic Note: If the server's total orphaned chunk count exceeds this plugin's lifetime loads ([loads]), this plugin is not the sole source of the memory leak."
infoWorldHeader: "#008080Worlds:"
infoConsoleWorldHeader: "&7--- Worlds ---"
infoWorld: "  #21ADA8[world]"
infoRegionHeader: "#63C5DARegions:"
infoConsoleRegionHeader: "&7--- Regions ---"
infoRegion: "  #52B2BF[region]"

# sub-info listings
# placeholders: [world], [region], [requirePermission], [override], [shape], [worldBorderOverride], [cacheCap], [cached], [keptCache], [unkeptCache], [backlogCache], [backlogCacheCap]
# learned-state placeholders (resolve to N/A when the region has no memory shape or has not been scanned): [memCoveragePct], [memBadPct], [memBadCount], [memTopCause], [memTopCausePct]
worldInfo:
  - "#21ADA8[world]:"
  - "#99EEBB  - region: [region]"
  - "#99EEBB  - requirePermission: [requirePermission]"
  - "#99EEBB  - override: [override]"

regionInfo:
  - "#52B2BF[region]:"
  - "#58CCED  - world: [world]"
  - "#58CCED  - shape: [shape]"
  - "#58CCED  - requirePermission: [requirePermission]"
  - "#58CCED  - worldBorderOverride: [worldBorderOverride]"
  - "#58CCED  - cacheCap: [cacheCap]"
  - "#58CCED  - keptCache (L1): [keptCache]"
  - "#58CCED  - unkeptCache (L2): [unkeptCache]"
  - "#58CCED  - backlogCache (L3): [backlogCache] / [backlogCacheCap]"
  - "#58CCED  - cached: [cached]"
  - "#58CCED  - learned coverage: [memCoveragePct] (bad: [memBadPct], [memBadCount] cells)"
  - "#58CCED  - top reject cause: [memTopCause] ([memTopCausePct])"

