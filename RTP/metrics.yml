# --- RTP Metrics Settings ---
# Reporting-only knobs for the metrics SPI. Throttle / tuning
# knobs continue to live in performance.yml.
# Populate MetricsSnapshot.foliaRegions() with per-region detail on Folia.
# Has no effect on Paper / Bukkit / Fabric (single-region runtimes always
# return an empty list, which is the correct answer for those platforms).
# @type: boolean
# @default: true
foliaIncludeRegions: true

# Aggregation strategy used to fold per-region samples into the scalar
# tps{1,5,15}m fields of MetricsSnapshot on Folia.
# Accepted values: mean | max
# @type: enum
# @default: mean
foliaAggregationTps: "mean"

# Aggregation strategy used to fold per-region samples into the scalar
# mspt field of MetricsSnapshot on Folia.
# Accepted values: mean | max
# @type: enum
# @default: max
foliaAggregationMspt: "max"

# Aggregation strategy used to fold per-region samples into the scalar
# tickBudgetUtilisation field of MetricsSnapshot on Folia.
# Accepted values: mean | max
# @type: enum
# @default: max
foliaAggregationTickBudget: "max"

# DO NOT TOUCH VERSION NUMBER
version: 1.0
