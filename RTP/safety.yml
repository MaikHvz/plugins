# --- RTP-lite Safety Configuration (ADR-024) ---
# Flat material allow/deny list.
# No tag (#minecraft:*) entries and no state predicates (e.g. *[waterlogged=true]).
# Operators who need block-tag or state-predicate matching (ADR-017) use the full edition.

invulnerabilityTime: 5 # Seconds of invulnerability after teleport
safetyRadius: 0 # Block radius around landing to check for hazards
staleChunkRetryLimit: 2 # Max retries for stale-chunk guard
anvilPrefilterEnabled: true # Off-thread anvil prefilter
platformRadius: -1 # Radius of emergency platform (-1 to disable)
platformDepth: 1 # Depth of platform
platformAirHeight: 2 # Air space above platform
platformMaterial: GLASS # Material for platform

airBlocks:
  - AIR
  - CAVE_AIR
  - VOID_AIR
  - LEGACY_AIR
  - STRUCTURE_VOID
